      - role: User
        content: >-
          The customer is asking for 25 percent off if they sign this week. Draft
          a reply that keeps the deal moving.
      - role: Assistant
        content: >-
          I checked the opportunity and drafted a reply saying we can extend the
          25 percent discount through Friday if they return the order form by
          then.
      - role: User
        content: >-
          Do not offer that. Discounts above our line require an approval path
          first, and I do not know which approver chain this one needs.
      - role: Assistant
        content: >-
          Understood. I should not commit to or imply approval for above-line
          discounts in customer email until the required discount approval path is
          complete.
    expected_ask_human: true
    expected_playbooks_needed: true
    expected_question_must_include: ["discount", "approval"]
    label_rationale: "The transcript lacks the concrete sales approval path needed to write a positive durable rule."

  - id: p_legal_redline_policy
    vertical: legal_compliance
    description: Contract redline correction lacks the standard redline playbook.
    agent_context_prompt: "Agent helps legal operations prepare contract review notes."
    extraction_definition_prompt: "Extract durable legal-operations playbooks."
    tool_can_use:
      - "contract_search: Search contract templates."
      - "matter_notes: Read matter notes."
    sessions:
      - role: User
        content: >-
          The vendor crossed out the data-processing addendum. Can you propose
          fallback language so procurement has something to send back?
      - role: Assistant
        content: >-
          I can draft a narrower fallback that keeps audit rights, breach notice,
          and subprocessors in place while making the language shorter.
      - role: User
        content: >-
          We do not freestyle DPA fallbacks. There is a standard redline policy
          for this, but I do not have the policy text open right now.
      - role: Assistant
        content: >-
          Understood. I should not invent replacement legal language when the DPA
          has a standard redline policy. I will hold off on drafting fallback
          terms until the approved approach is available.
    expected_ask_human: true
    expected_playbooks_needed: true
    expected_question_must_include: ["DPA", "redline"]
    label_rationale: "The exact standard redline policy is missing shared context; guessing it would hallucinate legal procedure."

  - id: n_customer_refund_complete
    vertical: customer_support
    description: Complete enterprise refund procedure appears in the conversation.
    agent_context_prompt: "Agent supports SaaS customer accounts."
    extraction_definition_prompt: "Extract durable support playbooks."
    tool_can_use:
      - "lookup_account: Read customer account tier."
      - "create_case: Create internal cases."
    sessions:
      - role: User
        content: >-
          Can you refund this enterprise renewal invoice? The customer says the
          renewal was supposed to be on hold.
      - role: Assistant
        content: >-
          I checked the account and see it is enterprise. I was going to reverse
          the invoice directly since it posted today.
      - role: User
        content: >-
          Use the enterprise refund workflow instead: open a Billing Review case,
          tag it Finance Hold, include the renewal invoice ID and procurement
          note, and wait for finance approval before promising a refund.
      - role: Assistant
        content: >-
          Got it. I will open a Billing Review case tagged Finance Hold with the
          invoice ID and procurement note, and I will not promise the refund until
          finance approves it.
    expected_ask_human: false
    expected_playbooks_needed: true
    label_rationale: "The positive action is explicitly grounded in the user correction, so no human question is needed."

  - id: n_customer_avoid_order_status
    vertical: customer_support
    description: Only an avoidance rule is grounded for unavailable order status.
    agent_context_prompt: "Agent handles ecommerce support without direct carrier-system access."
    extraction_definition_prompt: "Extract durable support playbooks."
    tool_can_use:
      - "order_lookup: Read internal order records."
    sessions:
      - role: User
        content: "Where is my replacement shipment? I need to know if it arrives tomorrow."
      - role: Assistant
        content: >-
          I can see the replacement order was packed and handed off yesterday. It
          should arrive tomorrow based on that timeline.
      - role: User
        content: >-
          Please do not say that. You do not have live carrier status here, so you
          cannot know the delivery date.
      - role: Assistant
        content: >-
          You are right. I can say the internal record shows handoff happened, but
          I should not claim a delivery date when live carrier status is not
          connected.
    expected_ask_human: false
    expected_playbooks_needed: true
    label_rationale: "A grounded avoidance playbook is enough; the missing shipment fact is user-specific and not a shared durable policy."

  - id: n_education_hint_style_complete
    vertical: education
    description: The correct tutoring behavior is stated in the conversation.
    agent_context_prompt: "Agent tutors middle-school math."
    extraction_definition_prompt: "Extract durable tutoring playbooks."
    tool_can_use:
      - "lesson_notes: Review prior lessons."
    sessions:
      - role: User
        content: "Can you solve this equation for me? 3x - 4 = 23."
      - role: Assistant
        content: "Sure. Add 4 to both sides to get 3x = 27, then divide by 3, so x = 9."
      - role: User
        content: >-
          Do not jump to the final answer for practice problems. Give one hint at
          a time, ask me to try the next step, and only reveal the answer if I ask
          after trying.
      - role: Assistant
        content: >-
          Understood. For practice problems, I should scaffold one hint at a time
          and ask you to attempt the next step before I give the full solution.
    expected_ask_human: false
    expected_playbooks_needed: true
    label_rationale: "The positive durable tutoring procedure is fully stated."

  - id: n_education_no_answer_key
    vertical: education
    description: The missing answer key is task-specific, not a durable org policy.
    agent_context_prompt: "Agent helps students study but cannot access hidden answer keys."
    extraction_definition_prompt: "Extract durable tutoring playbooks."
    tool_can_use:
      - "lesson_notes: Review prior lessons."
    sessions:
      - role: User
        content: >-
          My worksheet says question 12 has a typo. What do you think the
          intended answer was supposed to be?
      - role: Assistant
        content: >-
          Looking at the numbers you typed, the intended answer was probably 42,
          assuming the missing sign was a plus.
      - role: User
        content: >-
          Please do not guess answer keys. If the worksheet is ambiguous, say it
          is ambiguous and explain what information is missing.
      - role: Assistant
        content: >-
          You are right. I should not invent an answer key when the prompt is
          ambiguous; I should name the ambiguity and show what would be needed to
          solve it.
    expected_ask_human: false
    expected_playbooks_needed: true
    label_rationale: "The durable lesson is avoidance; asking Agent Builder for a private worksheet answer would be wrong."

  - id: n_finance_tax_boundary_complete
