cases:
  - id: p_customer_enterprise_refund
    vertical: customer_support
    description: Enterprise refund correction lacks the approved positive procedure.
    agent_context_prompt: "Agent supports SaaS customer accounts across self-serve and enterprise plans."
    extraction_definition_prompt: "Extract durable support playbooks that change future account-handling behavior."
    tool_can_use:
      - "lookup_account: Read customer account tier and contract metadata."
      - "create_case: Create an internal follow-up case."
    sessions:
      - role: User
        content: >-
          The renewal invoice posted this morning even though procurement asked us
          to hold it. Can you refund it today so our PO does not get tangled up?
      - role: Assistant
        content: >-
          I checked the account and invoice record. It looks like the invoice is
          still recent, so I can reverse the charge and note that procurement had
          requested a hold.
      - role: User
        content: >-
          Please do not reverse it directly. We are enterprise, and that bypasses
          our refund process. I do not have the name of the internal route in
          front of me, but finance gets very unhappy when support promises or
          issues these immediately.
      - role: Assistant
        content: >-
          Thanks for stopping me. I will not promise or issue the refund from
          here, and I will keep the response limited to acknowledging the billing
          issue while it goes through the proper enterprise refund process.
    expected_ask_human: true
    expected_playbooks_needed: true
    expected_question_must_include: ["enterprise", "refund"]
    label_rationale: "The transcript supports avoiding instant enterprise refunds, but the approved enterprise refund path is missing shared org policy."

  - id: p_customer_outage_escalation_queue
    vertical: customer_support
    description: Support escalation correction lacks the correct outage queue or routing target.
    agent_context_prompt: "Agent triages customer reports for a cloud communications product."
    extraction_definition_prompt: "Extract durable support escalation playbooks."
    tool_can_use:
      - "status_page: Check public incident status."
      - "create_case: Create support cases."
    sessions:
      - role: User
        content: >-
          Our SMS traffic has been down for about twenty minutes in EU West.
          Messages are accepted by the API but nothing is delivering.
      - role: Assistant
        content: >-
          I checked the public status page and do not see an active incident yet.
          I can open a normal support case with the region, timestamps, and sample
          message IDs, then keep watching for a status-page update.
      - role: User
        content: >-
          A normal support case is too slow for regional traffic loss. There is a
          special outage route for this, but I do not know the queue name.
      - role: Assistant
        content: >-
          Understood. I should not treat regional message delivery loss as a
          standard ticket just because the public status page is quiet. I will
          avoid giving a wait-and-see answer and flag that this needs the outage
          escalation route.
    expected_ask_human: true
    expected_playbooks_needed: true
    expected_question_must_include: ["regional outage", "queue"]
    label_rationale: "A durable escalation playbook needs the exact shared routing target; the transcript only says the normal ticket path is wrong."

  - id: p_education_accommodation_policy
    vertical: education
    description: Tutoring correction names an accommodation category but not the approved handling policy.
    agent_context_prompt: "Agent tutors students and coordinates with school staff when policies require it."
    extraction_definition_prompt: "Extract durable tutoring and education-support playbooks."
    tool_can_use:
      - "lesson_notes: Review prior lesson notes."
      - "message_teacher: Send teacher-facing notes."
    sessions:
      - role: User
        content: >-
          I keep freezing during timed algebra quizzes. Can we just skip the
          timed parts when we practice?
      - role: Assistant
        content: >-
          We can make practice feel less stressful. For today's session, I will
          have you ignore the timer and focus on solving each problem accurately.
      - role: User
        content: >-
          That is not how my accommodation works. There is a specific school
          process for changing quiz conditions, and you should not improvise it
          from my complaint.
      - role: Assistant
        content: >-
          You are right. I can keep tutoring the algebra concept, but I should
          not tell you to bypass or change timed-quiz conditions unless the
          approved accommodation process says to do that.
    expected_ask_human: true
    expected_playbooks_needed: true
    expected_question_must_include: ["accommodation", "process"]
    label_rationale: "The future rule needs the school's approved accommodation process, which is shared context not present in the dialogue."

  - id: p_education_grading_rubric
    vertical: education
    description: Grading feedback correction lacks the department's required rubric workflow.
    agent_context_prompt: "Agent helps teaching assistants draft feedback for student writing."
    extraction_definition_prompt: "Extract durable teaching-assistant playbooks."
    tool_can_use:
      - "course_materials: Search course policies and assignment sheets."
    sessions:
      - role: User
        content: >-
          This essay is disorganized and the citations are thin. Can you draft
          feedback and suggest a grade for the TA notes?
      - role: Assistant
        content: >-
          Based on the draft, I would mark it around a C: the thesis arrives late,
          the topic sentences do not guide the reader, and the evidence is not
          consistently cited.
      - role: User
        content: >-
          We cannot assign grades from impressions like that. Composition uses a
          departmental rubric and a calibration step before feedback goes out.
      - role: Assistant
        content: >-
          Got it. I should not grade the essay from my own general writing
          judgment when this course requires the department rubric and calibration
          workflow.
    expected_ask_human: true
    expected_playbooks_needed: true
    expected_question_must_include: ["rubric", "calibration"]
    label_rationale: "The correction establishes a durable issue, but the rubric/calibration procedure is absent."

  - id: p_finance_ips_review
    vertical: finance
    description: Portfolio advice correction lacks the firm's IPS review workflow.
    agent_context_prompt: "Agent assists financial advisors with client-service drafts; it must not invent firm policy."
    extraction_definition_prompt: "Extract durable financial-advisor support playbooks."
    tool_can_use:
      - "crm_profile: Read client profile facts."
      - "portfolio_summary: Summarize holdings."
    sessions:
      - role: User
        content: >-
          Client asked whether we should move more cash into small-cap funds after
          the rally. Can you draft a note for the advisor?
      - role: Assistant
        content: >-
          I reviewed the portfolio summary. Since the current cash balance is
          above target, I can draft a note saying a modest increase to small-cap
          exposure may be reasonable if the client accepts the added volatility.
      - role: User
        content: >-
          Stop. This client has an IPS. Allocation changes go through our review
          process first, and the note should not imply a recommendation before
          that happens.
      - role: Assistant
        content: >-
          Understood. I should not draft or imply an allocation recommendation
          for an IPS client before the firm's IPS review process is complete.
    expected_ask_human: true
    expected_playbooks_needed: true
    expected_question_must_include: ["IPS", "review"]
    label_rationale: "The extractor should not invent the firm's review process, but the missing shared process blocks a positive playbook."

  - id: p_finance_options_approval
    vertical: finance
    description: Options-trading correction lacks the approval desk/procedure.
    agent_context_prompt: "Agent supports a brokerage service team."
    extraction_definition_prompt: "Extract durable brokerage service playbooks."
    tool_can_use:
      - "account_flags: Check account permissions."
      - "secure_message: Send client messages."
    sessions:
      - role: User
        content: >-
          The client wants to write covered calls in the IRA. Can you send them
          instructions for placing the order?
      - role: Assistant
        content: >-
          I checked the account flags and see the IRA is active. I can draft a
          secure message explaining where they would enter a covered-call order
          and remind them to review the risks.
      - role: User
        content: >-
          Do not send trading instructions yet. Options activity has to follow our
          approval path first, and I do not want the message to get ahead of that.
      - role: Assistant
        content: >-
          Thanks, I will not provide options-order instructions from this thread.
          I should wait until the required options approval path is satisfied
          before drafting anything that helps place the trade.
    expected_ask_human: true
    expected_playbooks_needed: true
    expected_question_must_include: ["options", "approval"]
    label_rationale: "A durable positive rule needs the approved options workflow, not just the avoidance."

  - id: p_health_red_flag_triage
    vertical: healthcare
    description: Wellness assistant correction lacks the red-flag routing protocol.
    agent_context_prompt: "Agent helps patients navigate a clinic portal but does not provide medical diagnosis."
    extraction_definition_prompt: "Extract durable clinic-navigation playbooks."
    tool_can_use:
      - "book_visit: Book routine appointments."
      - "message_care_team: Send portal messages."
    sessions:
      - role: User
        content: >-
          I have had chest tightness since this morning. Can you book the next
          available visit with my primary-care doctor?
      - role: Assistant
        content: >-
          I can help with scheduling. The next routine primary-care slot I see is
          Thursday afternoon, and I can also send the care team a portal message
          with your symptoms.
      - role: User
        content: >-
          That should not be handled as routine scheduling. There is a red-flag
          route for symptoms like this, but I do not remember the exact wording
          the clinic wants us to use.
      - role: Assistant
        content: >-
          You are right to call that out. I should not route chest tightness into
          an ordinary appointment workflow, and I should avoid softening it into a
          routine scheduling request.
    expected_ask_human: true
    expected_playbooks_needed: true
    expected_question_must_include: ["red-flag", "route"]
    label_rationale: "The transcript lacks the clinic's exact red-flag routing instruction needed for a positive playbook."

  - id: p_health_proxy_privacy
    vertical: healthcare
    description: Caregiver privacy correction lacks the portal's proxy-consent policy.
    agent_context_prompt: "Agent helps with patient portal account questions."
    extraction_definition_prompt: "Extract durable patient-portal support playbooks."
    tool_can_use:
      - "account_access: Check portal access status."
    sessions:
      - role: User
        content: >-
          My dad asked me to check his lab appointment. Can you tell me what is on
          his portal?
      - role: Assistant
        content: >-
          I can help if the account shows you have access. If you give me his
          portal email, I will look up the appointment details and summarize the
          lab visit for you.
      - role: User
        content: >-
          No, family relationship is not enough. Proxy access has a specific
          consent policy, and I do not know the exact support script for it.
      - role: Assistant
        content: >-
          Understood. I should not disclose or summarize patient portal details
          just because someone says they are family, and I need to follow the
          approved proxy-consent policy before discussing the account.
    expected_ask_human: true
    expected_playbooks_needed: true
    expected_question_must_include: ["proxy", "consent"]
    label_rationale: "The correction needs a durable proxy-consent procedure, which is missing shared policy."

  - id: p_general_travel_policy
    vertical: general_purpose
    description: Travel booking correction lacks the company travel-policy approval path.
    agent_context_prompt: "Agent acts as a general-purpose executive assistant for employees."
    extraction_definition_prompt: "Extract durable executive-assistant playbooks."
    tool_can_use:
      - "calendar: Check calendar availability."
      - "travel_search: Search flights and hotels."
    sessions:
      - role: User
        content: >-
          Book me the nonstop flight to Berlin. It is pricey, but it saves almost
          five hours and I need to land before the partner dinner.
      - role: Assistant
        content: >-
          I found a nonstop business fare that matches your calendar and arrives
          in time. I can hold it now and complete the booking with your saved
          traveler profile.
      - role: User
        content: >-
          Pause before booking. Trips over the threshold need our travel-policy
          approval flow first, and I do not remember which approver path applies
          for international flights.
      - role: Assistant
        content: >-
          Good catch. I will not book or hold the over-threshold fare yet. I
          should treat this as requiring the company's travel approval flow before
          taking action on the reservation.
    expected_ask_human: true
    expected_playbooks_needed: true
    expected_question_must_include: ["travel", "approval"]
    label_rationale: "The threshold workflow is shared company policy and is not present in the transcript."

  - id: p_ops_canonical_deployment_target
    vertical: digital_employee
    description: Deployment correction lacks the canonical production target.
    agent_context_prompt: "Agent works as a digital employee helping engineers operate internal services."
    extraction_definition_prompt: "Extract durable internal-ops playbooks."
    tool_can_use:
      - "repo_search: Search repository files."
      - "deploy_status: Read deployment status."
    sessions:
      - role: User
        content: >-
          Can you prep the release notes and deployment checklist for the payment
          service?
      - role: Assistant
        content: >-
          I searched the repository and saw Kubernetes manifests, so I drafted the
          checklist around building the image, applying manifests, and watching
          the rollout in the cluster.
      - role: User
        content: >-
          That is the wrong production path for this service. We have one
          canonical deployment target, but the repo has old artifacts that make it
          easy to guess wrong.
      - role: Assistant
        content: >-
          Thanks for the correction. I should not infer the production deployment
          target from stray repo files when this service has a canonical path.
    expected_ask_human: true
    expected_playbooks_needed: true
    expected_question_must_include: ["canonical", "deployment"]
    label_rationale: "A positive deployment playbook must name the target/path, but it is not in the conversation, tools, or context."

  - id: p_sales_discount_approval
    vertical: sales
