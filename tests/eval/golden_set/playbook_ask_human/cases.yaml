  - id: n_ops_prior_pending_attach
    vertical: digital_employee
    description: Matching pending request exists, so fresh ask_human is wrong.
    agent_context_prompt: "Agent helps engineers operate services."
    extraction_definition_prompt: "Extract durable internal-ops playbooks."
    tool_can_use:
      - "repo_search: Search repository files."
    prior_pending_tool_calls:
      - pending_tool_call_id: ptc_existing_deployment_target
        question_text: "What is the canonical production deployment target for payment services?"
        answer_format: "short text"
        tags: ["deployment"]
    sessions:
      - role: User
        content: >-
          The release helper assumed Kubernetes for payment-service deployment
          because it found old manifests in the repo.
      - role: Assistant
        content: >-
          I agree that is not enough evidence. I know not to infer from stale repo
          artifacts, but I still do not know the canonical production deployment
          target for payment services.
      - role: User
        content: >-
          Right, and that exact deployment-target clarification is already
          pending from last week. Do not create another duplicate request for the
          same missing fact.
    expected_ask_human: false
