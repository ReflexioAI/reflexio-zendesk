services:
  reflexio-backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: reflexio-zendesk:local
    command:
      [
        "uv",
        "run",
        "reflexio",
        "services",
        "start",
        "--only",
        "backend",
        "--no-reload",
        "--workers",
        "1",
        "--storage",
        "postgres",
      ]
    ports:
      - "8081:8081"
    environment:
      BACKEND_PORT: "8081"
      LOCAL_STORAGE_PATH: /data/reflexio
      REFLEXIO_LOG_DIR: /data/reflexio
      REFLEXIO_STORAGE: postgres
      POSTGRES_DB_URL: ${POSTGRES_DB_URL:?Set POSTGRES_DB_URL to your Postgres connection URL}
      REFLEXIO_POSTGRES_SCHEMA: ${REFLEXIO_POSTGRES_SCHEMA:-public}
      REFLEXIO_POSTGRES_POOL_SIZE: ${REFLEXIO_POSTGRES_POOL_SIZE:-5}
      REFLEXIO_EMBEDDING_PROVIDER: ${REFLEXIO_EMBEDDING_PROVIDER:-}
      CLAUDE_SMART_USE_LOCAL_EMBEDDING: ${CLAUDE_SMART_USE_LOCAL_EMBEDDING:-}
      IS_TEST_ENV: "false"
      DEBUG_LOG_TO_CONSOLE: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
    volumes:
      - reflexio-data:/data/reflexio
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  reflexio-data:
