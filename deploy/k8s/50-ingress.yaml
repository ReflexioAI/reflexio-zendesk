apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: reflexio-backend
  namespace: reflexio
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - reflexio.example.com
      secretName: reflexio-tls
  rules:
    - host: reflexio.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: reflexio-backend
                port:
                  name: http
