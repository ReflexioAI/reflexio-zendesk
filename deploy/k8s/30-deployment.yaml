apiVersion: apps/v1
kind: Deployment
metadata:
  name: reflexio-backend
  namespace: reflexio
  labels:
    app.kubernetes.io/name: reflexio-backend
    app.kubernetes.io/part-of: reflexio
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: reflexio-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: reflexio-backend
        app.kubernetes.io/part-of: reflexio
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: reflexio-backend
          image: reflexio-zendesk:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: reflexio-backend-config
            - secretRef:
                name: reflexio-backend-secrets
          volumeMounts:
            - name: reflexio-data
              mountPath: /data/reflexio
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: reflexio-data
          persistentVolumeClaim:
            claimName: reflexio-data
